<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Top Down Seagull</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #eef7fb;
      overflow: hidden;
      touch-action: none;
      font-family: system-ui, sans-serif;
    }

    canvas {
      width: 100vw;
      height: 100vh;
      display: block;
      image-rendering: pixelated;
    }

    .pad {
      position: fixed;
      left: 24px;
      bottom: 24px;
      display: grid;
      grid-template-columns: 56px 56px 56px;
      grid-template-rows: 56px 56px 56px;
      gap: 8px;
      user-select: none;
    }

    button {
      border: 2px solid #1f2937;
      background: rgba(255,255,255,0.7);
      border-radius: 14px;
      font-size: 24px;
      font-weight: 800;
    }

    .up { grid-column: 2; grid-row: 1; }
    .left { grid-column: 1; grid-row: 2; }
    .right { grid-column: 3; grid-row: 2; }
    .down { grid-column: 2; grid-row: 3; }

    .hint {
      position: fixed;
      top: 16px;
      left: 16px;
      color: #334155;
      font-size: 14px;
      background: rgba(255,255,255,0.65);
      padding: 8px 12px;
      border-radius: 12px;
    }
  </style>
</head>

<body>
  <canvas id="game"></canvas>

  <div class="hint">Move with WASD / arrows / D-pad</div>

  <div class="pad">
    <button class="up" data-key="up">▲</button>
    <button class="left" data-key="left">◀</button>
    <button class="right" data-key="right">▶</button>
    <button class="down" data-key="down">▼</button>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const keys = {
      up: false,
      down: false,
      left: false,
      right: false
    };

    const gull = {
      x: 200,
      y: 200,
      speed: 150,
      facing: 0
    };

    function resize() {
      canvas.width = Math.floor(window.innerWidth);
      canvas.height = Math.floor(window.innerHeight);
    }

    window.addEventListener("resize", resize);
    resize();

    window.addEventListener("keydown", e => {
      if (e.key === "ArrowUp" || e.key.toLowerCase() === "w") keys.up = true;
      if (e.key === "ArrowDown" || e.key.toLowerCase() === "s") keys.down = true;
      if (e.key === "ArrowLeft" || e.key.toLowerCase() === "a") keys.left = true;
      if (e.key === "ArrowRight" || e.key.toLowerCase() === "d") keys.right = true;
    });

    window.addEventListener("keyup", e => {
      if (e.key === "ArrowUp" || e.key.toLowerCase() === "w") keys.up = false;
      if (e.key === "ArrowDown" || e.key.toLowerCase() === "s") keys.down = false;
      if (e.key === "ArrowLeft" || e.key.toLowerCase() === "a") keys.left = false;
      if (e.key === "ArrowRight" || e.key.toLowerCase() === "d") keys.right = false;
    });

    document.querySelectorAll("button").forEach(btn => {
      const key = btn.dataset.key;

      btn.addEventListener("pointerdown", e => {
        e.preventDefault();
        keys[key] = true;
        btn.setPointerCapture(e.pointerId);
      });

      btn.addEventListener("pointerup", e => {
        e.preventDefault();
        keys[key] = false;
      });

      btn.addEventListener("pointercancel", () => {
        keys[key] = false;
      });
    });

    function pixel(x, y, w, h, colour) {
      ctx.fillStyle = colour;
      ctx.fillRect(Math.round(x), Math.round(y), w, h);
    }

    function drawSeagull(x, y, time, moving) {
      const scale = 5;
      const flap = Math.round(Math.sin(time * (moving ? 14 : 7)) * 2);
      const bob = Math.round(Math.sin(time * 4) * 1);

      ctx.save();
      ctx.translate(Math.round(x), Math.round(y + bob));
      ctx.rotate(gull.facing);

      // shadow
      pixel(-12 * scale, 9 * scale, 24 * scale, 4 * scale, "rgba(15,23,42,0.12)");

      // wings
      pixel(-8 * scale, (-1 + flap) * scale, 5 * scale, 2 * scale, "#d9e2e8");
      pixel(-13 * scale, (0 + flap) * scale, 5 * scale, 2 * scale, "#cbd5dc");
      pixel(-18 * scale, (1 + flap) * scale, 5 * scale, 2 * scale, "#94a3b8");

      pixel(3 * scale, (-1 + flap) * scale, 5 * scale, 2 * scale, "#d9e2e8");
      pixel(8 * scale, (0 + flap) * scale, 5 * scale, 2 * scale, "#cbd5dc");
      pixel(13 * scale, (1 + flap) * scale, 5 * scale, 2 * scale, "#94a3b8");

      // body
      pixel(-3 * scale, -5 * scale, 6 * scale, 12 * scale, "#f8fafc");
      pixel(-2 * scale, -3 * scale, 4 * scale, 8 * scale, "#e2e8f0");

      // head
      pixel(-3 * scale, -9 * scale, 6 * scale, 5 * scale, "#ffffff");

      // beak
      pixel(-1 * scale, -13 * scale, 2 * scale, 4 * scale, "#f59e0b");

      // eyes
      pixel(-2 * scale, -8 * scale, 1 * scale, 1 * scale, "#0f172a");
      pixel(1 * scale, -8 * scale, 1 * scale, 1 * scale, "#0f172a");

      // tail
      pixel(-4 * scale, 7 * scale, 3 * scale, 4 * scale, "#cbd5e1");
      pixel(1 * scale, 7 * scale, 3 * scale, 4 * scale, "#cbd5e1");

      ctx.restore();
    }

    let last = performance.now();

    function loop(now) {
      const dt = Math.min((now - last) / 1000, 0.033);
      last = now;

      let dx = 0;
      let dy = 0;

      if (keys.up) dy -= 1;
      if (keys.down) dy += 1;
      if (keys.left) dx -= 1;
      if (keys.right) dx += 1;

      const moving = dx !== 0 || dy !== 0;

      if (moving) {
        const length = Math.hypot(dx, dy);
        dx /= length;
        dy /= length;

        gull.x += dx * gull.speed * dt;
        gull.y += dy * gull.speed * dt;

        gull.facing = Math.atan2(dy, dx) + Math.PI / 2;
      }

      gull.x = Math.max(40, Math.min(canvas.width - 40, gull.x));
      gull.y = Math.max(40, Math.min(canvas.height - 40, gull.y));

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      drawSeagull(gull.x, gull.y, now / 1000, moving);

      requestAnimationFrame(loop);
    }

    requestAnimationFrame(loop);
  </script>
</body>
</html>
